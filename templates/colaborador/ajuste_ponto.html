{% extends "base_colaborador.html" %}

{% block conteudo %}

<h1>Solicitação de Ajuste de Ponto</h1>

<form method="POST" action="/enviar-ajuste">

    <label>Data do Ajuste</label>

    <br><br>

    <input
        type="date"
        name="data"
        required>

    <br><br>

    <label>Tipo do Ajuste</label>

    <br><br>

    <select name="tipo" required>

        <option value="">Selecione</option>

        <option>Entrada</option>

        <option>Saída Intervalo</option>

        <option>Retorno Intervalo</option>

        <option>Saída Final</option>

    </select>

    <br><br>

    <label>Horário Correto</label>

    <br><br>

    <input
        type="time"
        name="horario"
        required>

    <br><br>

    <label>Justificativa</label>

    <br><br>

    <textarea
        name="motivo"
        rows="5"
        cols="50"
        required></textarea>

    <br><br>

    <button type="submit">

        Enviar Solicitação

    </button>

</form>

<br><br>

<a href="/meus-ajustes">

    <button type="button">

        Minhas Solicitações

    </button>

</a>

<br><br>

<a href="/ponto">

    <button type="button">

        Voltar

    </button>

</a>

{% endblock %}
