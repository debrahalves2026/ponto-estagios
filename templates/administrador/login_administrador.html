<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login Administrador</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="container">

    <h1>Área do Administrador</h1>

    <p>
        Sistema de Controle de Ponto
    </p>

    <form method="POST">

        <input
            type="text"
            name="login"
            placeholder="Login"
            required>

        <br><br>

        <input
            type="password"
            name="senha"
            placeholder="Senha"
            required>

        <br><br>

        <button type="submit">
            Entrar
        </button>

    </form>

    <br>

    <a href="/">
        <button type="button">
            Voltar
        </button>
    </a>

    {% if erro %}

    <br><br>

    <p style="color:red;">
        {{ erro }}
    </p>

    {% endif %}

</div>

</body>
</html>
