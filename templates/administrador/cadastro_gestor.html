{% extends "base_administrador.html" %}

{% block conteudo %}

<h1>Cadastrar Gestor</h1>

<form action="/salvar-gestor" method="POST">

    <input
        type="text"
        name="nome"
        placeholder="Nome Completo"
        required>

    <br><br>

    <select name="nucleo" required>
        <option value="">Selecione o Núcleo</option>
        <option>Assistência de Arbitragens</option>
        <option>CEFAP</option>
        <option>GEAC</option>
        <option>Núcleo Ambiental (NA)</option>
        <option>Núcleo de Poder de Polícia (NPP)</option>
        <option>Núcleo de Saúde Pública (NSP)</option>
        <option>Núcleo Trabalhista (NT)</option>
        <option>SubCG</option>
    </select>

    <br><br>

    <input
        type="text"
        name="unidade_exercicio"
        placeholder="Unidade de Exercício"
        required>

    <br><br>

    <input
        type="text"
        name="celular"
        placeholder="Número do Celular">

    <br><br>

    <input
        type="text"
        name="login"
        placeholder="Login do Gestor"
        required>

    <br><br>

    <input
        type="text"
        value="Novocolab123"
        readonly>

    <small>
        Senha padrão para primeiro acesso.
    </small>

    <br><br>

    <button type="submit">
        Cadastrar Gestor
    </button>

</form>

{% endblock %}
