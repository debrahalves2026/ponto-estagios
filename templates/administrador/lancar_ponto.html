{% extends "base_administrador.html" %}

{% block conteudo %}

<h1>Lançamento Manual de Ponto</h1>

<form action="/salvar-lancamento-ponto" method="POST">

    <label>Núcleo</label>

    <br><br>

    <select id="nucleo-select" required>
        <option value="">Selecione o Núcleo</option>
        <option>Assistência de Arbitragens</option>
        <option>Coordenadoria de Execuções Contra a Fazenda Pública (CEFAP)</option>
        <option>Grupo Especial de Atuação do Contencioso Geral (GEAC)</option>
        <option>Núcleo Ambiental (NA)</option>
        <option>Núcleo de Contencioso PGE DETRAN</option>
        <option>Núcleo de Gestão e Prevenção de Demandas Repetitivas (GPDR)</option>
        <option>Núcleo de Pessoal Carreiras de Estado (NPCE)</option>
        <option>Núcleo de Pessoal Educação (NPE)</option>
        <option>Núcleo de Pessoal Militar (NPM)</option>
        <option>Núcleo de Pessoal Residual (NPR)</option>
        <option>Núcleo de Poder de Polícia (NPP)</option>
        <option>Núcleo de Políticas Públicas (NPPublicas)</option>
        <option>Núcleo de Propositura de Ações (NPA)</option>
        <option>Núcleo de Regulações e Contratações Públicas (NRCP)</option>
        <option>Núcleo de Responsabilidade Civil (NRC)</option>
        <option>Núcleo de Saúde Pública (NSP)</option>
        <option>Núcleo Estratégico de Pessoal e Previdenciário (NEPP)</option>
        <option>Núcleo Imobiliário (NI)</option>
        <option>Núcleo Previdenciário (SPPREV)</option>
        <option>Núcleo Responsabilidade Subsidiária de Serviços Terceirizados (NRST)</option>
        <option>Procuradoria do Estado de São Paulo em Brasília (PESPB)</option>
        <option>SubCG</option>
    </select>

    <br><br>

    <label>Colaborador</label>

    <br><br>

    <select id="colaborador-select" name="colaborador_id" required disabled>
        <option value="">Selecione o Colaborador</option>
        {% for colaborador in colaboradores %}
        <option value="{{ colaborador[0] }}" data-nucleo="{{ colaborador[2] }}">
            {{ colaborador[1] }}
        </option>
        {% endfor %}
    </select>

    <br><br>

    <label>Data</label>

    <br><br>

    <input
        type="date"
        name="data"
        required>

    <br><br>

    <label>Horário de Entrada</label>

    <br><br>

    <input
        type="time"
        name="entrada"
        required>

    <br><br>

    <label>Horário de Saída</label>

    <br><br>

    <input
        type="time"
        name="saida_final"
        required>

    <br><br>

    <label>Observação</label>

    <br><br>

    <textarea
        name="observacao"
        rows="4"
        cols="50"
        placeholder="Observação (opcional)"></textarea>

    <br><br>

    <button type="submit">
        Salvar Registro
    </button>

</form>

<script>
    const nucleoSelect = document.getElementById('nucleo-select');
    const colaboradorSelect = document.getElementById('colaborador-select');
    const colaboradorOptions = Array.from(colaboradorSelect.querySelectorAll('option'));

    nucleoSelect.addEventListener('change', () => {
        const selectedNucleo = nucleoSelect.value;
        colaboradorSelect.innerHTML = '<option value="">Selecione o Colaborador</option>';

        if (!selectedNucleo) {
            colaboradorSelect.disabled = true;
            return;
        }

        const filtered = colaboradorOptions.filter(option => {
            return option.dataset.nucleo === selectedNucleo;
        });

        filtered.forEach(option => {
            colaboradorSelect.appendChild(option.cloneNode(true));
        });

        colaboradorSelect.disabled = filtered.length === 0;
    });
</script>

{% endblock %}
