<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login Gestor</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="container">

    <h1>Área do Gestor</h1>

    <form method="POST">

        <select name="nucleo" required>
            <option value="">Selecione o Núcleo</option>
            <option>Núcleo de Poder de Polícia (NPP)</option>
            <option>Núcleo de Saúde Pública (NSP)</option>
            <option>Núcleo Trabalhista (NT)</option>
        </select>

        <br><br>

        <input
            type="text"
            name="login"
            placeholder="Login"
            required>

        <br><br>

        <input
            type="password"
            name="senha"
            placeholder="Senha"
            required>

        <br><br>

        <button type="submit">
            Entrar
        </button>

    </form>

    {% if erro %}
        <p style="color:red;">
            {{ erro }}
        </p>
    {% endif %}

</div>

</body>
</html>
