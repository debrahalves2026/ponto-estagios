<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login Colaborador</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="container">

    <h1>Área do Colaborador</h1>

    <form method="POST">

        <input
            type="text"
            name="login"
            placeholder="Login"
            required>

        <br><br>

        <input
            type="password"
            name="senha"
            placeholder="Senha"
            required>

        <br><br>

        <button type="submit">
            Entrar
        </button>

    </form>

    {% if erro %}
        <p style="color:red;">
            {{ erro }}
        </p>
    {% endif %}

</div>

</body>
</html>
